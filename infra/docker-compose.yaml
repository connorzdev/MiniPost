services:
  production-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "8080:18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  keycloak:
    image: "quay.io/keycloak/keycloak:26.6"
    command:
      - "start"
      - "--import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_PASSWORD}"
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES: "opentelemetry"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "keycloak"
    ports:
      - "6001:8080"
      - "9000"
    volumes:
      - type: "volume"
        target: "/opt/keycloak/data"
        source: "post-keycloak-data"
        read_only: false
      - type: "bind"
        target: "/opt/keycloak/data/import"
        source: "${KEYCLOAK_BINDMOUNT_0}"
        read_only: true
    networks:
      - "aspire"
  meilisearch:
    image: "docker.io/getmeili/meilisearch:v1.21"
    environment:
      MEILI_MASTER_KEY: "${MEILISEARCH_MASTERKEY}"
    ports:
      - "7700"
    volumes:
      - type: "volume"
        target: "/meili_data"
        source: "post-meilisearch-data"
        read_only: false
    networks:
      - "aspire"
  postgres:
    image: "docker.io/library/postgres:18.3"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql"
        source: "post-postgres-data"
        read_only: false
    networks:
      - "aspire"
  messaging:
    image: "docker.io/library/rabbitmq:4.3-management"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "${MESSAGING_PASSWORD}"
    expose:
      - "5672"
      - "15672"
    volumes:
      - type: "volume"
        target: "/var/lib/rabbitmq"
        source: "post-rabbitmq-data"
        read_only: false
    networks:
      - "aspire"
  post-service:
    image: "${POST_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${POST_SERVICE_PORT}"
      KEYCLOAK_HTTP: "http://keycloak:8080"
      services__keycloak__http__0: "http://keycloak:8080"
      ConnectionStrings__postDb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=postDb"
      POSTDB_HOST: "postgres"
      POSTDB_PORT: "5432"
      POSTDB_USERNAME: "postgres"
      POSTDB_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTDB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postDb"
      POSTDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/postDb"
      POSTDB_DATABASENAME: "postDb"
      ConnectionStrings__messaging: "amqp://guest:${MESSAGING_PASSWORD}@messaging:5672"
      MESSAGING_HOST: "messaging"
      MESSAGING_PORT: "5672"
      MESSAGING_USERNAME: "guest"
      MESSAGING_PASSWORD: "${MESSAGING_PASSWORD}"
      MESSAGING_URI: "amqp://guest:${MESSAGING_PASSWORD}@messaging:5672"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "post-service"
    expose:
      - "${POST_SERVICE_PORT}"
    depends_on:
      keycloak:
        condition: "service_started"
      postgres:
        condition: "service_started"
      messaging:
        condition: "service_started"
    networks:
      - "aspire"
  search-service:
    image: "${SEARCH_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${SEARCH_SERVICE_PORT}"
      ConnectionStrings__meilisearch: "Endpoint=http://meilisearch:7700;MasterKey=${MEILISEARCH_MASTERKEY}"
      MEILISEARCH_HOST: "meilisearch"
      MEILISEARCH_PORT: "7700"
      MEILISEARCH_MASTERKEY: "${MEILISEARCH_MASTERKEY}"
      MEILISEARCH_URI: "http://meilisearch:7700"
      ConnectionStrings__messaging: "amqp://guest:${MESSAGING_PASSWORD}@messaging:5672"
      MESSAGING_HOST: "messaging"
      MESSAGING_PORT: "5672"
      MESSAGING_USERNAME: "guest"
      MESSAGING_PASSWORD: "${MESSAGING_PASSWORD}"
      MESSAGING_URI: "amqp://guest:${MESSAGING_PASSWORD}@messaging:5672"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "search-service"
    expose:
      - "${SEARCH_SERVICE_PORT}"
    depends_on:
      meilisearch:
        condition: "service_started"
      messaging:
        condition: "service_started"
    networks:
      - "aspire"
  gateway:
    image: "mcr.microsoft.com/dotnet/nightly/yarp:2.3-preview"
    command:
      - "/app/yarp.dll"
    entrypoint:
      - "dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      POST_SERVICE_HTTP: "http://post-service:${POST_SERVICE_PORT}"
      REVERSEPROXY__ROUTES__route0__MATCH__PATH: "/posts/{**catch-all}"
      REVERSEPROXY__ROUTES__route0__CLUSTERID: "cluster_post-service"
      REVERSEPROXY__ROUTES__route1__MATCH__PATH: "/search/{**catch-all}"
      REVERSEPROXY__ROUTES__route1__CLUSTERID: "cluster_search-service"
      REVERSEPROXY__CLUSTERS__cluster_post-service__DESTINATIONS__destination1__ADDRESS: "https+http://post-service"
      REVERSEPROXY__CLUSTERS__cluster_search-service__DESTINATIONS__destination1__ADDRESS: "https+http://search-service"
      services__post-service__http__0: "http://post-service:${POST_SERVICE_PORT}"
      POST_SERVICE_HTTPS: "https://post-service:${POST_SERVICE_PORT}"
      SEARCH_SERVICE_HTTP: "http://search-service:${SEARCH_SERVICE_PORT}"
      services__search-service__http__0: "http://search-service:${SEARCH_SERVICE_PORT}"
      SEARCH_SERVICE_HTTPS: "https://search-service:${SEARCH_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "gateway"
    ports:
      - "8001:5000"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  post-keycloak-data:
    driver: "local"
  post-meilisearch-data:
    driver: "local"
  post-postgres-data:
    driver: "local"
  post-rabbitmq-data:
    driver: "local"
